           class="navbar-image mr-1">
      <p class="navbar-heading-text mt-3">Maharashtra Tour Guide</p>

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <div class="navbar-nav ml-auto">
      <a class="nav-link active" id ="navbar-items1" href="index.html">Home</a>
      <a class="nav-link" id ="navbar-items2" href="destinations.html">Destinations</a>

<!-- CONTENT -->
<div class="container mt-5 pt-5">

  <div class="text-center mb-4">
    <h1 class="Travel-Tips-heading">Seasonal Travel Planner</h1>
    <p class="destination-paragraph">
      Choose the best travel experience in Maharashtra based on the season.
    </p>
  </div>

  <!-- SEASON SELECT -->
  <div class="row justify-content-center mb-4">
    <div class="col-md-4">
      <select class="form-control" id="seasonSelect" onchange="filterSeason()">
        <option value="monsoon">Monsoon (June – Sept)</option>
        <option value="summer">Summer (March – May)</option>
        <option value="winter">Winter (Oct – Feb)</option>
      </select>
    </div>
  </div>

  <!-- RECOMMENDED -->
  <h1 class="destination-heading mb-3">✅ Recommended Trips</h1>
  <div class="row" id="recommendedTrips"></div>

  <!-- NOT RECOMMENDED -->
  <h1 class="destination-heading mt-4 mb-3">❌ Not Recommended</h1>
  <div class="row" id="notRecommendedTrips"></div>

  <!-- AI BUTTON -->
  <div class="text-center mt-4">
    <button class="seasonal-Button" onclick="explainSeason()">
      Why these recommendations?
    </button>
  </div>

  <!-- AI RESPONSE -->
  <div class="mt-4 destination-card shadow p-3 d-none" id="aiExplanation"></div>

</div>

<script src="script.js"></script>
